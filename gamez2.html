<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DOS EXE Runner (キャンバス直指定)</title>
  <script src="https://js-dos.com/6.22/current/js-dos.js"></script>
  <style>
    body { margin: 0; background: #000; }
    #app { display: flex; flex-direction: column; height: 100vh; }
    #topbar { background: #1a1a2e; color: #fff; padding: 8px 16px; display: flex; align-items: center; gap: 12px; }
    #fileInput { color: #ccc; }
    #status { color: #8be9fd; font-size: 0.9rem; margin-left: auto; }
    #gameArea { flex: 1; display: flex; align-items: center; justify-content: center; background: #000; }
    canvas { max-width: 100%; max-height: 100%; }
  </style>
</head>
<body>
  <div id="app">
    <div id="topbar">
      <span>🖥️ DOS Runner</span>
      <input type="file" id="fileInput" accept=".exe,.com,.zip">
      <span id="status">ファイルを選んでください</span>
    </div>
    <div id="gameArea" id="gameArea">
      <!-- キャンバスはJSで動的に作成 -->
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script>
    (() => {
      const fileInput = document.getElementById('fileInput');
      const statusDiv = document.getElementById('status');
      const gameArea = document.getElementById('gameArea');
      let currentDosbox = null;
      let currentCanvas = null;

      // ZIP から .exe を取り出す
      async function extractExeFromZip(file) {
        const zip = await JSZip.loadAsync(file);
        let target = null;
        zip.forEach((path, f) => {
          if (!f.dir && !target && (path.toLowerCase().endsWith('.exe') || path.toLowerCase().endsWith('.com'))) {
            target = f;
          }
        });
        if (!target) throw new Error('ZIP内に .exe / .com が見つかりません');
        const data = await target.async('uint8array');
        if (!data || data.length === 0) throw new Error('実行ファイルが空です');
        return { bytes: data, name: target.name.split('/').pop() };
      }

      fileInput.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // 後片付け
        if (currentDosbox) {
          try { await currentDosbox.stop(); } catch(e) {}
          currentDosbox = null;
        }
        gameArea.innerHTML = ''; // キャンバスも消える
        statusDiv.textContent = '読み込み中...';

        try {
          let bytes, exeName;
          const fname = file.name.toLowerCase();
          if (fname.endsWith('.zip')) {
            statusDiv.textContent = 'ZIP展開中...';
            const ext = await extractExeFromZip(file);
            bytes = ext.bytes;
            exeName = ext.name;
          } else if (fname.endsWith('.exe') || fname.endsWith('.com')) {
            const buf = await file.arrayBuffer();
            bytes = new Uint8Array(buf);
            exeName = file.name;
            if (bytes.length === 0) throw new Error('ファイルが空です');
          } else {
            throw new Error('未対応の形式です');
          }

          // バンドル作成
          statusDiv.textContent = 'バンドル作成中...';
          const bundle = new JSZip();
          bundle.file('dosbox.conf', `[autoexec]\n@echo off\nmount c .\nc:\n${exeName}\n`);
          bundle.file(exeName, bytes);
          const blob = await bundle.generateAsync({type:'blob'});
          const url = URL.createObjectURL(blob);

          // キャンバスを用意
          const canvas = document.createElement('canvas');
          canvas.style.width = '100%';
          canvas.style.height = '100%';
          gameArea.appendChild(canvas);
          currentCanvas = canvas;

          // DOSBox 生成（キャンバスを渡す）
          statusDiv.textContent = 'DOSBox 起動中...';
          if (typeof Dos !== 'function') throw new Error('js-dos が読み込まれていません');
          const dos = await Dos(canvas, { wdosboxUrl: "https://js-dos.com/6.22/current/wdosbox.js" });
          console.log('Dos instance:', dos);
          if (!dos || typeof dos.run !== 'function') {
            throw new Error('DOSBox インスタンスが不完全 (runがない)');
          }
          currentDosbox = dos;
          await dos.run(url);
          statusDiv.textContent = '✅ 実行中';
          setTimeout(() => URL.revokeObjectURL(url), 15000);

        } catch (err) {
          console.error(err);
          statusDiv.textContent = '❌ ' + err.message;
          gameArea.innerHTML = '<span style="color:#888;">起動失敗</span>';
        }
      });

      // ドラッグ＆ドロップ
      gameArea.addEventListener('dragover', e => e.preventDefault());
      gameArea.addEventListener('drop', e => {
        e.preventDefault();
        const files = e.dataTransfer.files;
        if (files.length) {
          const dt = new DataTransfer();
          dt.items.add(files[0]);
          fileInput.files = dt.files;
          fileInput.dispatchEvent(new Event('change'));
        }
      });
    })();
  </script>
</body>
</html>
